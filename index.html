<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>さざぶろぐ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root{
    --bg:#0b0c0e;
    --bg-soft:#131418;
    --border:#22242a;
    --text:#eceae4;
    --text-dim:#8b8d94;
    --accent:#7fe0c4;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Noto Sans JP',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  a{color:inherit;text-decoration:none}

  .glow{
    position:fixed;
    inset:0;
    background:radial-gradient(700px 400px at 15% -10%, rgba(127,224,196,.14), transparent 60%),
               radial-gradient(600px 500px at 100% 10%, rgba(127,224,196,.08), transparent 60%);
    pointer-events:none;
  }

  .wrap{
    position:relative;
    max-width:720px;
    margin:0 auto;
    padding:min(14vh,120px) 32px 80px;
    flex:1;
    width:100%;
  }

  .tag{
    font:500 12px/1 'JetBrains Mono',monospace;
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:22px;
  }

  h1{
    font-size:clamp(40px,8vw,64px);
    font-weight:900;
    letter-spacing:-.02em;
    margin:0 0 20px;
    line-height:1;
    background:linear-gradient(135deg,#fff 0%,var(--accent) 120%);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
  }

  p.lead{
    font-size:16px;
    line-height:1.8;
    color:var(--text-dim);
    max-width:32em;
    margin:0 0 64px;
  }

  .section-label{
    font:600 11px/1 'JetBrains Mono',monospace;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:18px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .section-label::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--border);
  }

  ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:1px;border-radius:14px;overflow:hidden;border:1px solid var(--border)}

  li{background:var(--bg-soft)}

  li a{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
    padding:22px 24px;
    transition:background .15s ease, padding-left .15s ease;
  }
  li a:hover{
    background:#181a1f;
    padding-left:30px;
  }

  .item-title{
    font-size:15.5px;
    font-weight:700;
    letter-spacing:-.005em;
  }

  .item-arrow{
    font:500 13px/1 'JetBrains Mono',monospace;
    color:var(--text-dim);
    opacity:0;
    transform:translateX(-4px);
    transition:opacity .15s ease, transform .15s ease;
  }
  li a:hover .item-arrow{
    opacity:1;
    color:var(--accent);
    transform:translateX(0);
  }

  footer{
    position:relative;
    text-align:center;
    padding:32px;
    font:400 11.5px/1 'JetBrains Mono',monospace;
    color:var(--text-dim);
    border-top:1px solid var(--border);
  }
</style>
</head>
<body>
<div class="glow"></div>
<div class="wrap">
  <div class="tag">sazanamix · personal notes</div>
  <h1>さざぶろぐ</h1>
  <p class="lead">個人的なメモ、備忘録、実験サイトです。</p>

  <div class="section-label">Pages</div>
  <ul>
    <li><a href="./uwsc-alternatives/"><span class="item-title">UWSC 後継ツール比較検討</span><span class="item-arrow">READ →</span></a></li>
    <li><a href="./code-gen-ai-comparison/"><span class="item-title">コード生成エージェント型AI 比較一覧</span><span class="item-arrow">READ →</span></a></li>
    <li><a href="./test-automation-tools/"><span class="item-title">Playwright / Cypress / Selenium、どれを選ぶ？</span><span class="item-arrow">READ →</span></a></li>
    <li><a href="./bike-comparison/"><span class="item-title">日本の4大バイクメーカーを数値で見比べる</span><span class="item-arrow">READ →</span></a></li>
    <li><a href="https://sazanamix.github.io/ivec-ux-quiz-web/"><span class="item-title">IVEC UX評価スペシャリスト クイズ (Web版)</span><span class="item-arrow">OPEN →</span></a></li>
  </ul>
</div>
<footer>© sazanamix</footer>
</body>
</html>
